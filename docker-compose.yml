services:
  api:
    build: ./api
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - appnetwork
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  worker:
    build: ./worker
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - appnetwork
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  frontend:
    build: ./frontend
    environment:
      - API_URL=http://api:8000
    networks:
      - appnetwork
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  redis:
    image: redis:7-alpine
    networks:
      - appnetwork
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
networks:
  appnetwork: